<ul class="visible-links">
  {% for link in site.data.navigation.main %}
    <li>
      <a href="{{ link.url }}"
         class="{% if page.url contains link.url and link.url != '/' %}active{% elsif page.url == '/' and link.url == '/' %}active{% endif %}">
        {{ link.title }}
      </a>
    </li>
  {% endfor %}
</ul>
